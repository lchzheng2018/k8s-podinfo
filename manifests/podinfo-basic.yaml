apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo
  namespace: podinfo
spec:
  replicas: 2

  selector:
    matchLabels:
      app: podinfo

  template:
    metadata:
      labels:
        app: podinfo

    spec:
      containers:
        - name: podinfo
          image: stefanprodan/podinfo:6.13.0

          ports:
            - containerPort: 9898

---
apiVersion: v1
kind: Service
metadata:
  name: podinfo
  namespace: podinfo
spec:
  selector:
    app: podinfo

  ports:
    - port: 80
      targetPort: 9898

  type: ClusterIP