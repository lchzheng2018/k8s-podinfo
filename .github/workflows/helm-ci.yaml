name: Helm CI

on:
  push:
  pull_request:

jobs:
  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Run helm lint
        run: helm lint charts/podinfo

      - name: Run helm template
        run: helm template podinfo charts/podinfo --namespace podinfo